<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>预测性维护售前助手</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
            Roboto, Helvetica, Arial, "PingFang SC", "Noto Sans SC", sans-serif;
        }

        body {
            background: #f6f7f9;
            color: #111;
        }

        .wrapper {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
        }

        .left {
            padding: 64px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: linear-gradient(180deg, #ffffff 0%, #f4f6f8 100%);
        }

        .tag {
            font-size: 12px;
            letter-spacing: 2px;
            color: #6b7280;
            margin-bottom: 18px;
        }

        .title {
            font-size: 42px;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 16px;
        }

        .desc {
            font-size: 15px;
            color: #4b5563;
            line-height: 1.7;
            max-width: 560px;
            margin-bottom: 28px;
        }

        .features {
            display: grid;
            gap: 10px;
            max-width: 560px;
        }

        .feature {
            font-size: 14px;
            color: #374151;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #111;
        }

        .right {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: #fff;
            border-left: 1px solid #eee;
        }

        .card {
            width: 100%;
            max-width: 380px;
            padding: 32px;
            border-radius: 14px;
            background: #fff;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
        }

        .card h2 {
            font-size: 20px;
            margin-bottom: 6px;
        }

        .card p {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 18px;
        }

        .form-item {
            margin-bottom: 14px;
        }

        .label {
            font-size: 13px;
            margin-bottom: 6px;
            color: #374151;
        }

        .input {
            width: 100%;
            height: 42px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 0 12px;
            outline: none;
            transition: 0.2s;
            font-size: 14px;
        }

        .input:focus {
            border-color: #1677ff;
            box-shadow: 0 0 0 3px rgba(22, 119, 255, 0.15);
        }

        .error {
            font-size: 12px;
            color: #ef4444;
            margin-top: 6px;
            min-height: 14px;
        }

        .btn {
            width: 100%;
            height: 42px;
            border: none;
            border-radius: 8px;
            background: #1677ff;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }

        .btn:hover {
            background: #0f5fd6;
        }

        .btn:disabled {
            background: #93c5fd;
            cursor: not-allowed;
        }

        .loading {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #fff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 900px) {
            .wrapper {
                grid-template-columns: 1fr;
            }

            .left {
                padding: 36px 22px 20px;
            }

            .title {
                font-size: 28px;
            }

            .right {
                border-left: none;
                background: #f6f7f9;
                padding: 24px 18px 40px;
            }

            .card {
                max-width: 100%;
            }
        }
    </style>
</head>

<body>

<div class="wrapper">
    <div class="left">
        <div class="tag">IOT · DIGITAL SALES PLATFORM</div>

        <div class="title">
            面向物联网设备的<br/>数字化销售与问答系统
        </div>

        <div class="desc">
            为销售与解决方案工程师提供标准化话术与智能问答支持，
            快速响应客户关于设备接入、数据平台、部署方案与行业应用的问题。
        </div>

        <div class="features">
            <div class="feature">
                <div class="dot"></div>
                标准化销售话术与方案推荐
            </div>
            <div class="feature">
                <div class="dot"></div>
                IoT 设备接入与协议解析支持
            </div>
            <div class="feature">
                <div class="dot"></div>
                行业场景解决方案自动生成
            </div>
            <div class="feature">
                <div class="dot"></div>
                客户问题实时智能应答
            </div>
        </div>
    </div>

    <div class="right">
        <div class="card">
            <h2>登录系统</h2>
            <p>请输入账号信息进入销售支持平台</p>

            <div class="form-item">
                <div class="label">用户名</div>
                <input id="username" class="input" placeholder="请输入用户名"/>
                <div class="error" id="usernameError"></div>
            </div>

            <div class="form-item">
                <div class="label">手机号</div>
                <input id="phone" class="input" placeholder="请输入中国大陆手机号"/>
                <div class="error" id="phoneError"></div>
            </div>

            <button class="btn" style="background-color: #0f766e" id="loginBtn" onclick="login()">登录</button>
        </div>
    </div>

</div>

<script>
    function validateUsername(name) {
        name = name.trim();
        if (!name) return "请输入用户名";
        if (name.length < 2 || name.length > 20) return "用户名长度需为2-20位";
        if (!/^[\u4e00-\u9fa5a-zA-Z·\s]+$/.test(name)) return "仅支持中文或英文用户名";
        return null;
    }

    function validatePhone(phone) {
        phone = phone.trim();
        if (!phone) return "请输入手机号";
        if (!/^1[3-9]\d{9}$/.test(phone)) return "手机号格式不正确";
        return null;
    }

    function setLoading(state) {
        const btn = document.getElementById("loginBtn");
        btn.disabled = state;
        btn.innerHTML = state
            ? `<span class="loading"></span>登录中...`
            : "登录";
    }

    async function login() {
        const source = new URLSearchParams(window.location.search).get("source")
        const username = document.getElementById("username").value;
        const phone = document.getElementById("phone").value;

        const uErr = document.getElementById("usernameError");
        const pErr = document.getElementById("phoneError");

        uErr.innerText = "";
        pErr.innerText = "";

        let error = false;

        const nameErr = validateUsername(username);
        if (nameErr) {
            uErr.innerText = nameErr;
            error = true;
        }

        const phoneErr = validatePhone(phone);
        if (phoneErr) {
            pErr.innerText = phoneErr;
            error = true;
        }

        if (error) return;

        setLoading(true);

        try {
            const res = await fetch("/api/auth/login", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    username: username.trim(),
                    phone: phone.trim(),
                    source: source.trim()
                })
            });

            const data = await res.json();

            if (!res.ok) {
                pErr.innerText = data.message || "登录失败";
                return;
            }

            localStorage.setItem("token", data.token);
            window.location.href = "home.html";

        } catch (e) {
            pErr.innerText = "网络错误，请稍后重试";
        } finally {
            setLoading(false);
        }
    }
</script>

</body>
</html>
