name: presales

networks:
  presales-base-net:
    driver: bridge
    name: presales-base-net

volumes:
  presales-sales-db-volume:

services:
  sales-db:
    image: docker.io/postgres:18.0-alpine3.22
    container_name: sales-db
    restart: on-failure
#    ports:
#      - ${LT_SALES_DB_PORT}:${LT_SALES_DB_PORT}
    environment:
      POSTGRES_USER: ${LT_SALES_DB_USER}
      POSTGRES_PASSWORD: ${LT_SALES_DB_PASS}
      POSTGRES_DB: ${LT_SALES_DB_NAME}
    networks:
      - presales-base-net
    volumes:
      - presales-sales-db-volume:/var/lib/postgresql/data

  sales-assistant:
    image: crpi-n68v5vsgyo3vr4da.cn-hangzhou.personal.cr.aliyuncs.com/linkedti/sales-assistant:v1
    container_name: sales-assistant
    restart: on-failure
    ports:
      - ${LT_SALES_HTTP_PORT}:${LT_SALES_HTTP_PORT}
    environment:
      LT_SALES_HTTP_PORT: ${LT_SALES_HTTP_PORT}
      LT_SALES_DB_HOST: sales-db
      LT_SALES_DB_PORT: ${LT_SALES_DB_PORT}
      LT_SALES_DB_USER: ${LT_SALES_DB_USER}
      LT_SALES_DB_PASS: ${LT_SALES_DB_PASS}
      LT_SALES_DB_NAME: ${LT_SALES_DB_NAME}
      LT_SALES_JWT_SECRET: ${LT_SALES_JWT_SECRET}
      LT_SALES_INIT_SQL_PATH: ${LT_SALES_INIT_SQL_PATH}
    depends_on:
      - sales-db
    volumes:
      - ./init-sql:${LT_SALES_INIT_SQL_PATH}
    networks:
      - presales-base-net
